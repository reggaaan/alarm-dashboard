<!DOCTYPE html>
<html>
<head>
    <title>Disaster Admin Dashboard</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
    <h2>🌍 Admin Panel</h2>
    <p>System: <span class="online">ONLINE</span></p>

    <nav>
        <p>Dashboard</p>
        <p>Alerts</p>
        <p>Map</p>
        <p>Logs</p>
    </nav>
</div>

<div class="main">

    <h1>Disaster Monitoring Dashboard</h1>

    <!-- STATUS CARDS -->
    <div class="grid">

        <div class="card">
            <h3>🌊 Flood</h3>
            <p id="flood">Loading...</p>
        </div>

        <div class="card">
            <h3>🔥 Fire</h3>
            <p id="fire">Loading...</p>
        </div>

        <div class="card">
            <h3>🌍 Earthquake</h3>
            <p id="quake">Loading...</p>
        </div>

    </div>

    <!-- MAP -->
    <div class="section">
        <h2>🗺 Live Map</h2>
        <div id="map"></div>
    </div>

    <!-- CHART -->
    <div class="section">
        <h2>📊 Activity Chart</h2>
        <canvas id="chart"></canvas>
    </div>

    <!-- ALERT BUTTON -->
    <button onclick="triggerAlert()">🚨 Trigger Alert</button>

</div>

<script src="app.js"></script>

</body>
</html>
